<!DOCTYPE html>
<html>
<head>
  <title> Sample JavaScript IO Page </title>
<script>
  function add() {
    let a = document.getElementById("fn").value;
    let b = document.getElementById("sn").value;
    let c = Number(a) + Number(b);
    document.getElementById("ans").innerHTML = c;
  }

  function sub() {
    let a = document.getElementById("fn").value;
    let b = document.getElementById("sn").value;
    let c = Number(a) - Number(b);
    document.getElementById("ans").innerHTML = c;
  }

  function multiplication() {
    let a = document.getElementById("fn").value;
    let b = document.getElementById("sn").value;
    let c = Number(a) * Number(b);
    document.getElementById("ans").innerHTML = c;
  }

  function division() {
    let a = document.getElementById("fn").value;
    let b = document.getElementById("sn").value;
    let c = Number(a) / Number(b);
    document.getElementById("ans").innerHTML = c;
  }
  
</script>
  
</head>
<body>
  <h3>This is a sample JavaScript and HTML document.</h3>

<p>First number? <input id="fn"> <br>
  Second number? <input id="sn"> <br>
  <button onclick="add()"> add </button>
  <button onclick="sub()"> subtract </button>
  <button onclick="multiplication()"> multiply </button>
  <button onclick="division()"> divide </button>
  
</p>
<p>
  Your Answer is <span id="ans">_________</span>
</p>

  
</body>
</html>
